services:
  db:
    image: m.daocloud.io/docker.io/library/postgres:16.9-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pan}
      POSTGRES_USER: ${POSTGRES_USER:-pan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pan_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pan} -d ${POSTGRES_DB:-pan}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-m.daocloud.io/docker.io/library/python:3.12.11-slim-bookworm}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pan}:${POSTGRES_PASSWORD:-pan_local_password}@db:5432/${POSTGRES_DB:-pan}
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-change-before-production}
      STORAGE_PATH: /data/files
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
      DEFAULT_QUOTA_BYTES: ${DEFAULT_QUOTA_BYTES:-10737418240}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-1073741824}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-administrator}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-123456}
    volumes:
      - ./data/files:/data/files
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-m.daocloud.io/docker.io/library/node:22.17.0-alpine3.21}
        NGINX_IMAGE: ${NGINX_IMAGE:-m.daocloud.io/docker.io/library/nginx:1.28.0-alpine3.21}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
